<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Viagem</title>
<meta name="theme-color" content="#185FA5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Viagem">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0e1620;--card:#16222e;--card2:#1c2b3a;--ink:#e9eef3;--muted:#9fb1c2;--line:#243443;--primary:#185FA5;--primary2:#1a7a8a;--primary-d:#0d3d6b;--ok:#1f9d63;--erro:#d2533f;--radius:14px}
  [data-theme="light"]{--bg:#eef1f4;--card:#ffffff;--card2:#f4f7fa;--ink:#16202b;--muted:#5b6b7d;--line:#e0e6ec}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;touch-action:manipulation}
  .header{-webkit-user-select:none;user-select:none}
  button{touch-action:manipulation}
  .header{background:linear-gradient(135deg,#0d3d6b,#185FA5 55%,#1a7a8a);color:#fff;padding:calc(env(safe-area-inset-top) + 20px) 18px 22px;border-radius:0 0 24px 24px;position:relative}
  .header h1{font-size:1.35rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
  .header.withback h1,.header.withback p{padding-left:48px;transition:padding .15s}
  .header p{font-size:.82rem;opacity:.9;margin-top:2px}
  .cfg-btn{position:absolute;top:calc(env(safe-area-inset-top) + 16px);right:16px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.18);border:0;color:#fff;font-size:1.2rem;cursor:pointer}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 90px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-top:14px}
  .card h2{font-size:1rem;font-weight:600;margin-bottom:.3rem}
  .sub{font-size:.85rem;color:var(--muted)}
  input.f{width:100%;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:11px;padding:12px 14px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px}
  input.f:focus{border-color:var(--primary2)}
  .btn{width:100%;border:0;background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff;border-radius:12px;padding:13px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
  .btn.soft{background:var(--card2);color:var(--ink);border:1.5px solid var(--line)}
  .btn:disabled{opacity:.6}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 14px;cursor:pointer;text-align:left}
  .tile .ic{font-size:1.6rem}
  .tile .t{font-weight:600;margin-top:6px}
  .tile .s{font-size:.78rem;color:var(--muted);margin-top:2px}
  .trips{display:flex;flex-direction:column;gap:8px;margin-top:4px}
  .trip-row{display:flex;align-items:center;gap:12px;width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;font-family:inherit;color:var(--ink);text-align:left}
  .trip-row:active{background:var(--card)}
  .trip-ic{font-size:1.15rem;flex:none;opacity:.9}
  .trip-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .trip-nm{font-weight:500;font-size:.95rem}
  .trip-dt{font-size:.76rem;color:var(--muted)}
  .trip-go{flex:none;color:var(--muted);font-size:1.3rem;line-height:1}
  .linkbtn{background:none;border:0;color:var(--muted);font-size:.85rem;cursor:pointer;font-family:inherit;padding:8px;text-decoration:none}
  .linkbtn:active{color:var(--primary2)}
  .status{font-size:.85rem;margin-top:8px;min-height:1.1em}
  .status.err{color:var(--erro)} .status.ok{color:var(--ok)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:60;display:none}
  .modal-bg.open{display:block}
  .modal{position:fixed;left:0;right:0;bottom:0;background:var(--card);border-radius:22px 22px 0 0;z-index:61;padding:12px 18px calc(env(safe-area-inset-bottom) + 20px);max-height:82vh;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
  body.locked{position:fixed;left:0;right:0;width:100%;overflow:hidden}
  .modal .handle{width:42px;height:5px;border-radius:5px;background:var(--line);margin:4px auto 14px}
  .mitem{display:flex;gap:12px;align-items:center;width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px;color:var(--ink);font-size:1rem;font-weight:500;cursor:pointer;text-align:left;font-family:inherit}
  .mitem .mic{font-size:1.15rem}
  .code-box{font-size:1.8rem;font-weight:700;letter-spacing:4px;text-align:center;background:var(--card2);border:1px dashed var(--primary2);border-radius:12px;padding:16px;margin:10px 0;color:var(--primary2)}
  .conn{font-size:.85rem;color:var(--muted);margin-top:6px}
  .toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 20px);transform:translateX(-50%) translateY(20px);background:#0a0f15;color:#fff;border:1px solid var(--line);padding:11px 18px;border-radius:999px;font-size:.9rem;opacity:0;transition:.25s;z-index:70;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ---------- navegação seções ---------- */
  .back-btn{position:absolute;top:calc(env(safe-area-inset-top) + 16px);left:16px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.18);border:0;color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .sec-title{font-size:1.1rem;font-weight:600;margin:2px 0 12px;display:flex;align-items:center;gap:.5rem}
  .muted{color:var(--muted)}
  .row{display:flex;align-items:center;gap:10px}
  .between{justify-content:space-between}
  .chip{display:inline-block;font-size:.72rem;padding:3px 9px;border-radius:999px;background:var(--card2);border:1px solid var(--line);color:var(--muted)}
  /* status da viagem + monitor */
  .status-chip{flex:none;font-weight:600}
  .st-plan{background:rgba(24,95,165,.16);border-color:#2f6ea8;color:#6aa9e0}
  .st-mon{background:rgba(26,122,138,.18);border-color:#1a7a8a;color:#3fb6c8}
  .st-conf{background:rgba(31,157,99,.18);border-color:#1f9d63;color:#37c07d}
  .st-warn{background:rgba(210,138,20,.18);border-color:#c8892a;color:#e0a53f}
  .st-done{background:rgba(159,177,194,.16);border-color:var(--muted);color:var(--muted)}
  .mon-best{border-color:var(--ok)}
  .mon-total{background:linear-gradient(135deg,var(--card2),var(--card))}
  .mon-pp{padding:10px 0;border-top:1px solid var(--line)}
  .mon-pp:first-of-type{border-top:0}
  .mon-refresh{width:auto!important;padding:8px 12px!important;margin:0!important;font-size:.82rem!important}
  .pill{border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:999px;padding:7px 14px;font-size:.82rem;cursor:pointer;font-family:inherit;white-space:nowrap}
  .pill.on{background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff;border-color:transparent}
  .scroller{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .scroller::-webkit-scrollbar{display:none}
  .fab{position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 18px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff;border:0;font-size:1.6rem;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.35);z-index:40;display:flex;align-items:center;justify-content:center}
  select.f{width:100%;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:11px;padding:12px 14px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px}
  textarea.f{width:100%;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:11px;padding:12px 14px;font-size:1rem;font-family:inherit;outline:none;margin-bottom:10px;resize:vertical;min-height:64px}
  label.lbl{font-size:.78rem;color:var(--muted);display:block;margin:2px 2px 5px}
  .del-btn{background:none;border:0;color:var(--erro);font-size:1rem;cursor:pointer;padding:6px}
  .mini{background:none;border:0;color:var(--muted);font-size:.82rem;cursor:pointer;padding:1px 4px;vertical-align:middle}
  /* ---------- início ---------- */
  .countdown{text-align:center;padding:18px}
  .countdown .big{font-size:3rem;font-weight:700;line-height:1;background:linear-gradient(135deg,#4aa3ff,#2fd0c6);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .countdown .lbl{font-size:.85rem;color:var(--muted);margin-top:4px}
  .cd-cap{text-align:center;font-size:.82rem;color:var(--muted);margin-bottom:8px}
  .cd-wrap{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .cd-block{text-align:center;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;min-width:58px}
  .cd-num{font-size:1.7rem;font-weight:700;color:#60a5fa;line-height:1}
  .cd-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:.25rem}
  .cd-live{text-align:center;color:#34d399;font-weight:600;padding:8px}
  .voo-grp{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:var(--primary2);font-weight:600;margin:12px 0 2px}
  .voo{border-top:1px solid var(--line);padding:9px 0}
  .voo-rota{font-weight:600;font-size:.9rem}
  .voo-times{font-size:.95rem;margin-top:2px;font-weight:500}
  .voo-times span{color:var(--muted);margin:0 5px;font-weight:400}
  .voo-times small{color:var(--muted);font-size:.7rem}
  .voo-meta{font-size:.74rem;color:var(--muted);margin-top:2px}
  .voo-loc{font-size:.76rem;color:var(--primary2);margin-top:4px;cursor:pointer;display:inline-block}
  .voo-loc b{letter-spacing:.06em;font-size:.82rem;color:var(--ink)}
  .voo-ast{font-size:.76rem;color:var(--muted);margin-top:3px}
  .res-item{border-top:1px solid var(--line);padding:9px 0}
  .res-item:first-of-type{border-top:0}
  .res-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .res-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--primary2);font-weight:600}
  .res-acts{flex:none;white-space:nowrap}
  .res-val{font-size:1rem;font-weight:600;margin-top:2px;word-break:break-word;cursor:pointer;line-height:1.4}
  .res-val.muted{font-weight:400;font-size:.85rem;cursor:default}
  .bar{height:9px;border-radius:6px;background:var(--card2);overflow:hidden;margin-top:8px}
  .bar > i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#185FA5,#1a7a8a)}
  .kpi{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .kpi .k{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:12px}
  .kpi .k .v{font-size:1.25rem;font-weight:700;margin-top:2px}
  .kpi .k .l{font-size:.72rem;color:var(--muted)}
  /* ---------- roteiro ---------- */
  .dia{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-top:12px;overflow:hidden}
  .dia-head{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
  .dia-n{width:38px;height:38px;flex:none;border-radius:11px;background:linear-gradient(135deg,#0d3d6b,#1a7a8a);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center}
  .dia-info{flex:1;min-width:0}
  .dia-d{font-size:.72rem;color:var(--muted)}
  .dia-t{font-weight:600;font-size:.92rem;margin-top:1px}
  .dia-g{font-size:.7rem;color:var(--primary2);font-weight:600;white-space:nowrap}
  .dia-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;white-space:nowrap;flex:none}
  .dia-w{font-size:.7rem;color:var(--muted);font-weight:600;white-space:nowrap}
  .dia-walk{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin:2px 0 10px;font-size:.78rem;color:var(--muted);line-height:1.5}
  .dia-walk b{color:var(--ink)}
  .dia-chev{color:var(--muted);transition:.2s}
  .dia.open .dia-chev{transform:rotate(180deg)}
  .dia-body{display:none;padding:0 14px 14px}
  .dia.open .dia-body{display:block}
  .dia-acts{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .actbtn{flex:1;min-width:130px;display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:10px;padding:9px;font-size:.82rem;font-weight:500;cursor:pointer;font-family:inherit;text-decoration:none}
  .actbtn.map{border-color:transparent;background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff}
  .aviso{display:flex;gap:8px;font-size:.78rem;color:var(--muted);background:rgba(210,83,63,.08);border:1px solid rgba(210,83,63,.25);border-radius:10px;padding:9px 11px;margin-bottom:8px;line-height:1.4}
  .stop{display:flex;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
  .stop:first-child{border-top:0}
  .stop-h{font-size:.72rem;color:var(--primary2);font-weight:600;width:44px;flex:none;padding-top:2px}
  .stop-ic{font-size:1.1rem;width:24px;flex:none;text-align:center}
  .stop-c{flex:1;min-width:0}
  .stop-t{font-weight:600;font-size:.86rem}
  .stop-m{font-size:.75rem;color:var(--muted);margin-top:2px;display:flex;gap:5px;align-items:flex-start}
  .stop-al{display:inline-block;font-size:.68rem;background:rgba(210,83,63,.15);color:#e8846f;padding:1px 7px;border-radius:6px;margin-top:3px}
  .stop-det{margin-top:5px}
  .stop-det summary{font-size:.75rem;color:var(--primary2);cursor:pointer}
  .stop-det .sec-t{font-size:.76rem;font-weight:600;margin-top:6px}
  .stop-det ul{margin:3px 0 0 16px;font-size:.75rem;color:var(--muted);line-height:1.5}
  /* ---------- foco (tela cheia) ---------- */
  .foco-ov{position:fixed;inset:0;background:var(--bg);z-index:80;display:none;flex-direction:column;padding:calc(env(safe-area-inset-top) + 14px) 16px calc(env(safe-area-inset-bottom) + 14px)}
  .foco-ov.open{display:flex}
  #focoBody{flex:1;display:flex;flex-direction:column;min-height:0}
  .foco-x{align-self:flex-end;background:var(--card2);border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:50%;font-size:1.1rem;cursor:pointer}
  .foco-prog{font-size:.78rem;color:var(--muted);text-align:center;margin-top:6px}
  .foco-dots{display:flex;gap:5px;justify-content:center;margin:8px 0}
  .foco-dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .foco-dot.on{background:var(--primary2);transform:scale(1.3)}
  .foco-dot.done{background:var(--primary)}
  .foco-card{flex:1;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin:10px 0;text-align:center}
  .foco-icon{font-size:2.6rem}
  .foco-hora{font-size:.85rem;color:var(--primary2);font-weight:600;margin-top:4px}
  .foco-titulo{font-size:1.35rem;font-weight:700;margin-top:4px}
  .foco-end,.foco-meta{font-size:.82rem;color:var(--muted);margin-top:8px;display:flex;gap:6px;align-items:center;justify-content:center;text-align:left}
  .foco-alerta{font-size:.82rem;color:#e8846f;margin-top:10px;background:rgba(210,83,63,.1);border-radius:10px;padding:8px}
  .foco-nota{font-size:.85rem;margin-top:10px;color:var(--ink)}
  .foco-avisos{text-align:left;margin-top:12px;background:rgba(24,95,165,.1);border:1px solid rgba(26,122,138,.3);border-radius:12px;padding:8px 12px}
  .foco-avisos summary{font-size:.82rem;font-weight:600;color:var(--primary2);cursor:pointer}
  .foco-aviso{font-size:.82rem;color:var(--ink);margin-top:8px;line-height:1.45}
  .foco-sec{text-align:left;background:var(--card2);border-radius:12px;padding:11px 13px;margin-top:10px}
  .foco-sec-t{font-size:.82rem;font-weight:600}
  .foco-sec ul{margin:5px 0 0 16px;font-size:.8rem;color:var(--muted);line-height:1.55}
  .foco-maps{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:10px;border-radius:10px;background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff;text-decoration:none;font-size:.88rem;font-weight:600}
  .foco-next{text-align:left;font-size:.82rem;color:var(--muted);margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
  .foco-next-l{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:var(--primary2);margin-bottom:2px}
  .foco-bar{display:flex;gap:10px}
  .foco-bar button{flex:1;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:12px;padding:13px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
  .foco-bar button.pri{border-color:transparent;background:linear-gradient(135deg,#185FA5,#1a7a8a);color:#fff}
  .foco-bar button:disabled{opacity:.4}
  /* ---------- checklist ---------- */
  .clsec{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-top:10px;overflow:hidden}
  .clsec-h{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer}
  .clsec-h .nm{flex:1;font-weight:600;font-size:.9rem}
  .clsec-h .ct{font-size:.72rem;color:var(--muted)}
  .clsec-body{display:none;padding:0 8px 6px}
  .clsec.open .clsec-body{display:block}
  .clsec.open .clsec-chev{transform:rotate(180deg)}
  .clitem{display:flex;align-items:center;gap:11px;padding:9px 8px;border-top:1px solid var(--line)}
  .clitem .box{width:22px;height:22px;flex:none;border-radius:7px;border:2px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem}
  .clitem.done .box{background:var(--ok);border-color:var(--ok);color:#fff}
  .clitem .tx{flex:1;font-size:.88rem}
  .clitem.done .tx{text-decoration:line-through;color:var(--muted)}
  .cladd{display:flex;gap:8px;padding:9px 8px}
  .cladd input{flex:1;border:1.5px solid var(--line);background:var(--card2);color:var(--ink);border-radius:9px;padding:9px 11px;font-size:.9rem;font-family:inherit;outline:none}
  /* ---------- gastos ---------- */
  .gtot{text-align:center;padding:6px 0 2px}
  .gtot .v{font-size:1.7rem;font-weight:700}
  .gtot .of{font-size:.82rem;color:var(--muted)}
  .glanc{display:flex;align-items:center;gap:11px;padding:12px 0;border-top:1px solid var(--line)}
  .gdot{width:9px;height:9px;border-radius:50%;flex:none}
  .glanc .gd{flex:1;min-width:0}
  .glanc .gt{font-weight:600;font-size:.88rem}
  .glanc .gm{font-size:.72rem;color:var(--muted);margin-top:1px}
  .glanc .gv{font-weight:700;font-size:.9rem;white-space:nowrap}
  .glanc .gv small{display:block;font-weight:400;font-size:.68rem;color:var(--muted);text-align:right}
  /* ---------- documentos ---------- */
  .doc{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px;margin-top:10px}
  .doc .di{font-size:1.5rem;width:34px;text-align:center;flex:none}
  .doc .dd{flex:1;min-width:0}
  .doc .dn{font-weight:600;font-size:.9rem}
  .doc .ds{font-size:.74rem;color:var(--muted);margin-top:1px}
  .doc a.dl{color:var(--primary2);font-size:.78rem;text-decoration:none;word-break:break-all}
  .empty{text-align:center;color:var(--muted);font-size:.88rem;padding:26px 10px}
  /* ---- Visão Tabela do dia ---- */
  .actbtn.tbl{border-color:transparent;background:var(--card2)}
  .dia:not(.tblmode) .t-off,.dia.tblmode .t-on{display:none}
  .dia-tabela{overflow-x:auto;margin:2px 0 10px;-webkit-overflow-scrolling:touch}

  /* ================= GASTOS ================= */
  function computeAcerto(gs){
    var bal={}, pagos={}, partes={};
    gs.forEach(function(g){
      var v=toReais(g.valor,g.moeda);
      var pay=(g.pagou&&g.pagou.length)?g.pagou:[], spl=(g.divide&&g.divide.length)?g.divide:[];
      if(!v||!pay.length||!spl.length)return;
      var perPay=v/pay.length, perSpl=v/spl.length;
      pay.forEach(function(p){bal[p]=(bal[p]||0)+perPay;pagos[p]=(pagos[p]||0)+perPay;});
      spl.forEach(function(s){bal[s]=(bal[s]||0)-perSpl;partes[s]=(partes[s]||0)+perSpl;});
    });
    var cred=[], deb=[];
    Object.keys(bal).forEach(function(p){var v=Math.round(bal[p]*100)/100;if(v>0.01)cred.push({p:p,v:v});else if(v<-0.01)deb.push({p:p,v:-v});});
    cred.sort(function(a,b){return b.v-a.v;});deb.sort(function(a,b){return b.v-a.v;});
    var tr=[], ci=0, di=0, cc=cred.map(function(x){return{p:x.p,v:x.v};}), dd=deb.map(function(x){return{p:x.p,v:x.v};});
    while(ci<cc.length&&di<dd.length){
      var m=Math.min(cc[ci].v,dd[di].v);
      tr.push({de:dd[di].p,para:cc[ci].p,v:Math.round(m*100)/100});
      cc[ci].v-=m;dd[di].v-=m;
      if(cc[ci].v<0.01)ci++;if(dd[di].v<0.01)di++;
    }
    return {bal:bal,pagos:pagos,partes:partes,tr:tr};
  }
  function renderAcerto(gs){
    var pessoas=dPessoas();
    var a=computeAcerto(gs);
    var ativos=pessoas.filter(function(p){return (a.pagos[p]||a.partes[p]);});
    Object.keys(a.pagos).concat(Object.keys(a.partes)).forEach(function(p){if(ativos.indexOf(p)<0)ativos.push(p);});
    if(!ativos.length)return '<div class="empty">Sem divisão ainda.<br>Lance um gasto marcando <b>quem pagou</b> e <b>dividir entre</b>.</div>';
    var cards=ativos.map(function(p){
      var saldo=Math.round((a.bal[p]||0)*100)/100;
      var cor=saldo>0.01?'var(--ok)':(saldo<-0.01?'var(--erro)':'var(--muted)');
      var txt=saldo>0.01?('recebe '+money(saldo)):(saldo<-0.01?('paga '+money(-saldo)):'quitado');
      return '<div class="glanc"><div class="gd"><div class="gt">'+esc(p)+'</div><div class="gm">pagou '+money(a.pagos[p]||0)+' · parte '+money(a.partes[p]||0)+'</div></div><div class="gv" style="color:'+cor+'">'+txt+'</div></div>';
    }).join('');
    var acertos=a.tr.length
      ? a.tr.map(function(t){return '<div class="glanc"><div class="gd"><div class="gt">'+esc(t.de)+' <span class="muted">→</span> '+esc(t.para)+'</div><div class="gm">acerto sugerido</div></div><div class="gv" style="color:var(--primary2)">'+money(t.v)+'</div></div>';}).join('')
      : '<div class="sub" style="padding:8px 0">Tudo quitado — ninguém deve nada. 🎉</div>';
    return '<div class="card"><h2 style="margin-bottom:4px">Saldo de cada um</h2><div class="sub" style="margin-bottom:6px">Quanto pagou, sua parte e o saldo.</div>'+cards+'</div>'+
      '<div class="card"><h2 style="margin-bottom:4px">Quem deve pra quem</h2><div class="sub" style="margin-bottom:6px">Menor número de transferências pra zerar tudo.</div>'+acertos+'</div>';
  }

  /* ================= DOCUMENTOS ================= */
  var DOC_BUCKET='viagem-docs', DOC_MAX=20971520;
  async function docUpload(file){
    if(!sb||!espacoId){toast('Sem conexão.');return null;}
    var ext=((file.name||'').split('.').pop()||'bin').toLowerCase().replace(/[^a-z0-9]/g,'')||'bin';
    var path=espacoId+'/'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+'.'+ext;
    var r=await sb.storage.from(DOC_BUCKET).upload(path,file,{contentType:file.type||'application/octet-stream',upsert:false});
    if(r.error){toast('Falha no upload: '+r.error.message);return null;}
    return {path:path,nome:file.name||'arquivo',tipo:file.type||'',size:file.size||0};
  }
  async function docSignedUrl(path){
    if(!sb)return null;var r=await sb.storage.from(DOC_BUCKET).createSignedUrl(path,3600);
    return (r&&r.data&&r.data.signedUrl)?r.data.signedUrl:null;
  }
  function tipoFromName(n){n=(n||'').toLowerCase();
    if(/passaport|passport/.test(n))return 'passport';
    if(/disney|magic kingdom|epcot|hollywood|animal kingdom|universal|epic|island|volcano|ingresso|ticket|park/.test(n))return 'ticket';
    if(/aluguel|carro|rental|locad|hertz|avis|alamo|budget|enterprise|sixt/.test(n))return 'reservation';
    if(/reserva|hotel|hosped|booking|airbnb|casa/.test(n))return 'reservation';
    if(/cupom|desconto|coupon|promo|perfumeland|simon|outlet|mall|millenia|shopping|old town|voucher|vmz/.test(n))return 'voucher';
    return 'other';}
  async function docMulti(inp){
    if(!inp||!inp.files||!inp.files.length)return;
    var files=[].slice.call(inp.files), ds=dDocs(), ok=0, i;
    for(i=0;i<files.length;i++){
      var f=files[i];
      if(f.size>DOC_MAX){toast('"'+(f.name||'')+'" é grande demais (máx 20MB)');continue;}
      toast('Enviando '+(i+1)+'/'+files.length+'…');
      var ar=await docUpload(f); if(!ar)continue;
      var nm=(f.name||'arquivo').replace(/\.[^.]+$/,'');
      ds.push({id:Date.now()+i,nome:nm,tipo:tipoFromName(f.name),pessoa:'',numero:'',validade:'',link:'',obs:'',arquivo:ar});
      ok++;
    }
    VIA.set('documentos',ds);render();toast(ok+' documento(s) anexado(s) ✓ — ajuste a categoria se precisar.');
  }

  var monChartView='total';

  function monChartSVG(hist,view){
    var key=view==='voo'?'voo_brl':'total_brl';
    var pts=[];
    for(var i=0;i<hist.length;i++){var v=hist[i][key];if(v!=null&&v!=='')pts.push({d:hist[i].dia,v:+v});}
    if(!pts.length)return '<div class="sub" style="text-align:center;padding:14px 0">Ainda sem histórico. Um ponto é gravado a cada busca diária.</div>';
    var col=view==='voo'?'#3fb6c8':'#37c07d';
    var last=pts[pts.length-1].v, vals=pts.map(function(p){return p.v;});
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
    if(pts.length===1)return '<div style="text-align:center;padding:10px 0"><div style="font-size:1.5rem;font-weight:700;color:var(--ink)">'+brlM(last)+'</div><div class="sub">'+monDMY(pts[0].d)+' · 1 dia coletado — a linha se forma nos próximos dias</div></div>';
    var W=320,H=110,pad=10,padB=18,n=pts.length,rng=(mx-mn)||1;
    var X=function(i){return pad+i*(W-2*pad)/(n-1);}, Y=function(v){return (H-padB)-(v-mn)/rng*(H-padB-pad);};
    var line='';for(var k=0;k<n;k++)line+=(k?' L':'M')+X(k).toFixed(1)+' '+Y(pts[k].v).toFixed(1);
    var area=line+' L'+X(n-1).toFixed(1)+' '+(H-padB)+' L'+X(0).toFixed(1)+' '+(H-padB)+' Z';
    var dots='';for(var m=0;m<n;m++)dots+='<circle cx="'+X(m).toFixed(1)+'" cy="'+Y(pts[m].v).toFixed(1)+'" r="2.3" fill="'+col+'"/>';
    var svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;overflow:visible">'+
      '<path d="'+area+'" fill="'+col+'" opacity="0.13"/>'+
      '<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round"/>'+dots+
      '<text x="'+pad+'" y="'+(H-4)+'" style="fill:var(--muted)" font-size="9">'+monDMY(pts[0].d)+'</text>'+
      '<text x="'+(W-pad)+'" y="'+(H-4)+'" style="fill:var(--muted)" font-size="9" text-anchor="end">'+monDMY(pts[n-1].d)+'</text></svg>';
    return svg+'<div class="row between" style="margin-top:6px"><span class="sub">menor '+brlM(mn)+' · maior '+brlM(mx)+'</span><span class="sub">hoje <b style="color:var(--ink)">'+brlM(last)+'</b></span></div>';
  }

  /* ================= MAPA (Leaflet lazy) ================= */
  var MCAT={rest:{e:'🍴',c:'#d2533f',n:'Comer'},shop:{e:'🛍️',c:'#8b5cf6',n:'Compras'},merc:{e:'🛒',c:'#1f9d63',n:'Mercado'},park:{e:'🎢',c:'#185FA5',n:'Parque'},tour:{e:'🎡',c:'#e08a1e',n:'Passeio'},base:{e:'🏠',c:'#64748b',n:'Base'}};
  function ensureLeaflet(){
    return new Promise(function(res,rej){
      if(window.L)return res();
      var css=document.createElement('link');css.rel='stylesheet';css.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(css);
      var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      s.onload=function(){res();};s.onerror=function(){rej();};document.head.appendChild(s);
    });
  }

  async function mapaRender(elId){
    var el=document.getElementById(elId);if(!el)return;
    var pts=VIA.get('mapa_pontos',[]);
    if(!Array.isArray(pts)||!pts.length){el.innerHTML='<div class="card"><h2 style="font-size:1rem">📍 Mapa</h2><div class="sub" style="margin-top:6px">Esta viagem ainda não tem pontos no mapa. Os pontos foram montados para a Viagem Orlando.</div></div>';return;}
    try{await ensureLeaflet();}catch(e){el.innerHTML='<div class="card"><h2 style="font-size:1rem">📍 Mapa</h2><div class="sub" style="margin-top:6px">Não consegui carregar o mapa agora (sem internet?). Tente de novo mais tarde.</div></div>';return;}
    var days=[];pts.forEach(function(p){(p.dias||[]).forEach(function(d){if(days.indexOf(d)<0)days.push(d);});});days.sort(function(a,b){return a-b;});
    var dayChips='<button class="mday sel" data-day="all">Todos</button>'+days.map(function(d){return '<button class="mday" data-day="'+d+'" style="--dc:'+dayColor(d)+'">D'+d+'</button>';}).join('');
    var chips=Object.keys(MCAT).map(function(k){return '<button class="mchip on" data-cat="'+k+'" style="--mc:'+MCAT[k].c+'">'+MCAT[k].e+' '+MCAT[k].n+'</button>';}).join('');
    el.innerHTML='<div class="mapctl">'+
      '<div class="mdays" id="mapDays">'+dayChips+'</div>'+
      '<div class="mchips">'+chips+'</div>'+
      '<div class="mtogrow"><button class="mtoggle on" id="mapRaio">◎ Raio do dia</button></div></div>'+
      '<div id="mapCanvas" class="mapcanvas"></div><div class="sub mapcount" id="mapCount"></div>';
    if(window.__vmap){try{window.__vmap.remove();}catch(e){}window.__vmap=null;}
    var sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Tiles © Esri'});
    var streets=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
    var map=L.map('mapCanvas',{layers:[sat],zoomControl:true,attributionControl:false}).setView([28.44,-81.47],10);
    window.__vmap=map;
    L.control.layers({'Satélite':sat,'Mapa':streets},null,{position:'topright'}).addTo(map);
    var raioLayer=L.layerGroup().addTo(map);
    var layer=L.layerGroup().addTo(map);
    var selDays=[],showRaio=true,catOn={};Object.keys(MCAT).forEach(function(k){catOn[k]=true;});
    function mIcon(cat){var m=MCAT[cat]||MCAT.base;return L.divIcon({className:'mpin',html:'<span style="background:'+m.c+'">'+m.e+'</span>',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-15]});}
    function dayColor(d){return 'hsl('+((d*47)%360)+',80%,58%)';}
    function dayShown(p){if(!selDays.length)return true;return (p.dias||[]).some(function(d){return selDays.indexOf(d)>=0;});}
    function drawRaio(){
      raioLayer.clearLayers();
      if(!showRaio)return;
      var explicit=selDays.length>0,dd=explicit?selDays:days;
      dd.forEach(function(dn){
        var dp=pts.filter(function(p){return (p.dias||[]).indexOf(dn)>=0;});
        if(!dp.length)return;
        var la=0,lo=0;dp.forEach(function(p){la+=p.lat;lo+=p.lng;});la/=dp.length;lo/=dp.length;
        var c=L.latLng(la,lo),r=450;dp.forEach(function(p){r=Math.max(r,c.distanceTo([p.lat,p.lng]));});r+=350;
        if(!explicit&&r>30000)return; /* no overview (Todos), pula dias de deslocamento (Orlando<->Miami) que viram círculos gigantes */
        var col=dayColor(dn);
        var circ=L.circle([la,lo],{radius:r,color:col,weight:explicit?2.4:1.6,opacity:explicit?.95:.55,fillColor:col,fillOpacity:explicit?.1:.04});
        circ.bindPopup('<b>Dia '+dn+'</b> · '+dp.length+' lugares');
        circ.addTo(raioLayer);
      });
    }
    function draw(){
      layer.clearLayers();var b=[];
      pts.forEach(function(p){
        if(!catOn[p.cat])return;
        if(!dayShown(p))return;
        var mk=L.marker([p.lat,p.lng],{icon:mIcon(p.cat)});
        mk.bindPopup('<b>'+esc(p.nome)+'</b><br><span style="color:#8aa">Dia '+((p.dias||[]).join(', '))+'</span>');
        mk.addTo(layer);b.push([p.lat,p.lng]);
      });
      drawRaio();
      var cnt=document.getElementById('mapCount');
      if(cnt){var lbl=b.length+' '+(b.length===1?'lugar':'lugares');
        var sd=selDays.slice().sort(function(a,b){return a-b;});
        if(sd.length===1)lbl+=' no Dia '+sd[0];
        else if(sd.length>1)lbl+=' · Dias '+sd.join(', ');
        cnt.textContent=lbl;}
      if(b.length)map.fitBounds(b,{padding:[36,36],maxZoom:15});
    }
    function syncDayChips(){el.querySelectorAll('.mday').forEach(function(x){var xv=x.getAttribute('data-day');if(xv==='all')x.classList.toggle('sel',selDays.length===0);else x.classList.toggle('sel',selDays.indexOf(parseInt(xv,10))>=0);});}
    draw();
    setTimeout(function(){map.invalidateSize();draw();},80);
    el.querySelectorAll('.mday').forEach(function(bt){bt.addEventListener('click',function(){
      var dv=bt.getAttribute('data-day');
      if(dv==='all'){selDays=[];}
      else{var dn=parseInt(dv,10),i=selDays.indexOf(dn);if(i>=0)selDays.splice(i,1);else selDays.push(dn);}
      syncDayChips();draw();
    });});
    document.getElementById('mapRaio').addEventListener('click',function(){showRaio=!showRaio;this.classList.toggle('on',showRaio);drawRaio();});
    el.querySelectorAll('.mchip').forEach(function(bt){bt.addEventListener('click',function(){var c=bt.getAttribute('data-cat');catOn[c]=!catOn[c];bt.classList.toggle('on',catOn[c]);draw();});});
  }

    var alvoChip=acima?'<span class="chip status-chip st-warn">acima do alvo</span>':'<span class="chip status-chip st-conf">dentro do alvo</span>';
    var totCard='<div class="card mon-total"><div class="gtot"><div class="v">'+brlM(tot)+'</div><div class="of">melhor combo · '+esc(melhor.titulo||'')+' (voo + hotel)</div></div>'+
      '<div class="row between" style="margin-top:12px"><span class="sub">Menor por pessoa (voo): <b style="color:var(--ink)">'+brlM(menorPP)+'</b></span>'+alvoChip+'</div>'+
      '<div class="sub" style="margin-top:4px">Alvo por pessoa: '+brlM(cfg.alvo_pp)+'</div></div>';
    var pp='<div class="card"><h2 style="font-size:1rem">👥 Por pessoa</h2>'+
      '<div class="sub" style="margin:4px 0 6px">Diego e Débora dividem o hotel; o fotógrafo entra só no voo.</div>'+
      monPP('Diego','voo + ½ hotel',menorPP+mh)+
      monPP('Débora','voo + ½ hotel',menorPP+mh)+
      monPP('Fotógrafo','só o voo',menorPP)+'</div>';
    var combos=Array.isArray(cfg.hotel_combos)?cfg.hotel_combos:[];
    var compCard='';
    if(combos.length>1){
      var comWin=combos.filter(function(c){return c.total!=null;}).sort(function(a,b){return a.total-b.total;})[0];
      var linhas=combos.map(function(c){
        var win=comWin&&c.slug===comWin.slug;
        var det='voo '+brlM(c.voo)+(c.hotel_noite?(' + €'+c.hotel_noite+'/n'+(c.hotel_estrelas?' '+Math.round(c.hotel_estrelas)+'★':'')):'');
        var badge=c.over_teto?' <span class="chip status-chip st-warn" style="font-size:.6rem;padding:1px 6px">hotel &gt;€'+teto+'</span>':'';
        return '<div class="row between mon-pp"><div><b style="color:var(--ink)">'+esc(c.titulo||'')+'</b>'+(win?' <span style="color:var(--ok)">★</span>':'')+'<div class="sub">'+det+badge+'</div></div><div style="font-weight:700'+(win?';color:var(--ok)':'')+'">'+(c.total!=null?brlM(c.total):'—')+'</div></div>';
      }).join('');
      compCard='<div class="card"><h2 style="font-size:1rem">🗓️ Abril ou Maio?</h2><div class="sub" style="margin:4px 0 6px">Total voo + hotel por janela · ★ = melhor combinação.</div>'+linhas+'</div>';
    }
    var chartCard='<div class="card"><h2 style="font-size:1rem">📈 Histórico diário</h2>'+
      '<div class="scroller" style="margin:10px 0 8px;gap:8px">'+
        '<span class="pill'+(monChartView==='total'?' on':'')+'" onclick="VUI.monChart(\'total\')">Voo + hotel</span>'+
        '<span class="pill'+(monChartView==='voo'?' on':'')+'" onclick="VUI.monChart(\'voo\')">Só voo</span>'+
      '</div>'+monChartSVG(hist,monChartView)+'</div>';
    var upd=melhor.atualizado_em?('<div class="sub" style="text-align:center;margin-top:14px">atualizado em '+fmtUpd(melhor.atualizado_em)+'</div>'):'';
    el.innerHTML=head+compCard+janelas+hotel+totCard+chartCard+pp+upd;
  }

  /* ================= ROUTER ================= */
  function renderTrips(){
    var lista;
    if(espacos.length){
      lista='<div class="trips">'+espacos.map(function(e){
        var per=fmtPeriodo(e.dataInicio,e.dataFim);
        return '<button class="trip-row" onclick="VUI.abrir(\''+e.id+'\')"><span class="trip-ic">🧳</span><span class="trip-main"><span class="trip-nm">'+esc(cidade(e.nome))+'</span><span class="trip-dt">'+(per?('📅 '+esc(per)):'datas a definir')+'</span></span>'+statusChip(e.status)+'<span class="trip-go">›</span></button>';
      }).join('')+'</div>';
    } else lista='<div class="empty">Você ainda não tem viagens.<br>Toque no + para criar a primeira.</div>';
    return lista+
      '<div style="text-align:center;margin-top:24px"><button class="linkbtn" onclick="VUI.joinForm()">🔑 Entrar com um código de convite</button></div>';
  }
  function joinForm(){
    openSheet('<h2 style="font-size:1.05rem;margin-bottom:6px">🔑 Entrar com código</h2><div class="sub" style="margin-bottom:12px">Alguém te passou um código de convite? Digite abaixo.</div>'+
      '<input class="f" id="joinCode" autocapitalize="characters" placeholder="código (ex.: ABC123)">'+
      '<button class="btn" onclick="VUI.join()">Entrar</button><div class="status" id="loStatus"></div>');
  }
  function novaViagemForm(){
    openSheet('<h2 style="font-size:1.05rem;margin-bottom:12px">🧳 Nova viagem</h2>'+
      '<label class="lbl">Nome da viagem</label><input class="f" id="nvNome" placeholder="ex.: Paris 2027">'+
      '<label class="lbl">Data de início (opcional)</label><input class="f" id="nvData" type="date">'+
      '<button class="btn" onclick="VUI.novaViagemSave()">Criar viagem</button>');
  }
  var SEC_TITLES={inicio:'🏠 Início',roteiro:'🗺️ Roteiro',mapa:'📍 Mapa',restaurantes:'🍴 Restaurantes',checklist:'🧳 Checklist',gastos:'💸 Gastos',documentos:'📄 Documentos',monitor:'📡 Monitoramento'};
  var SEC_FAB={gastos:gastoForm,documentos:docForm,roteiro:function(){diaForm();},checklist:function(){secForm();}};
  function render(){
    var app=$('#app');
    var back=$('#backBtn'), fab=$('#fab'), hdr=$('.header');
    if(back)back.style.display='none';if(fab)fab.style.display='none';if(hdr)hdr.classList.remove('withback');
    if(!user){
      $('#hsub').textContent='Entre na sua conta';
      app.innerHTML='<div class="card"><h2>🔐 Entrar na sua conta</h2><div class="sub" style="margin-bottom:12px">E-mail e senha. A mesma conta da suíte.</div>'+
        '<input class="f" id="loEmail" type="email" autocapitalize="off" autocorrect="off" placeholder="seu e-mail">'+
        '<input class="f" id="loPass" type="password" autocomplete="current-password" placeholder="senha">'+
        '<button class="btn" id="loBtn">Entrar</button>'+
        '<div class="status" id="loStatus"></div></div>';
      $('#loBtn').addEventListener('click',sbLogin);return;
    }
    if(!espacoId){
      $('#hsub').textContent='Suas viagens';
      app.innerHTML=renderTrips();
      if(fab)fab.style.display='flex';
      return;
    }
    if(view==='home'){
      if(back)back.style.display='flex';if(hdr)hdr.classList.add('withback');
      $('#hsub').textContent=cidade(espacoNome);
      var secs=SECOES.slice();
      if(dMeta().status==='Monitoramento')secs.splice(1,0,['📡','Monitoramento','voos & orçamento ao vivo','monitor']);
      var tiles=secs.map(function(s){return '<div class="tile" onclick="VUI.go(\''+s[3]+'\')"><div class="ic">'+s[0]+'</div><div class="t">'+esc(s[1])+'</div><div class="s">'+esc(s[2])+'</div></div>';}).join('');
      app.innerHTML='<div class="grid">'+tiles+'</div>';
      return;
    }
    // seção
    if(back)back.style.display='flex';if(hdr)hdr.classList.add('withback');
    $('#hsub').textContent=(SEC_TITLES[view]||'').replace(/^\S+\s/,'');
    var html='';
    if(view==='inicio')html=renderInicio();
    else if(view==='roteiro')html=renderRoteiro();
    else if(view==='mapa')html=renderMapa();
    else if(view==='restaurantes')html=renderRestaurantes();
    else if(view==='checklist')html=renderChecklist();
    else if(view==='gastos')html=renderGastos();
    else if(view==='documentos')html=renderDocumentos();
    else if(view==='monitor')html=renderMonitor();
    app.innerHTML=html;
    if(SEC_FAB[view]&&fab){fab.style.display='flex';}
  }

  /* ================= AÇÕES (globais p/ onclick) ================= */
  window.VUI={
    go:function(v){view=v;render();window.scrollTo(0,0);},
    home:function(){view='home';render();window.scrollTo(0,0);},
    back:function(){if(view!=='home'){view='home';render();}else{espacoId=null;espacoNome='';dados={};view='home';render();}window.scrollTo(0,0);},
    abrir:function(id){abrirViagem(id);},
    novaViagem:novaViagemForm,
    novaViagemSave:async function(){var nome=($('#nvNome').value||'').trim();var data=$('#nvData').value;if(!nome){toast('Dê um nome à viagem.');return;}await criarEspaco(nome);if(data)VIA.set('data',data);},
    join:function(){entrarPorCodigo();},
    dataForm:dataForm,
    dataSave:function(){var d=$('#dtStart').value;if(!d){toast('Escolha uma data.');return;}VIA.set('data',d);closeSheet();render();toast('Data salva ✓');},
    resForm:resForm,
    resSave:function(i){var label=($('#rsLabel').value||'').trim(), valor=($('#rsVal').value||'').trim();if(!label){toast('Dê um título.');return;}var rs=dReservas();if(i>=0&&rs[i]){rs[i]={label:label,valor:valor};}else{rs.push({label:label,valor:valor});}VIA.set('reservas',rs);closeSheet();render();toast('Salvo ✓');},
    resDel:function(i){var rs=dReservas();rs.splice(i,1);VIA.set('reservas',rs);render();},
    resCopy:function(i){var rs=dReservas(),it=rs[i];if(!it||!it.valor)return;try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(it.valor);toast('Copiado: '+it.label);}else{toast(it.valor);}}catch(e){toast(it.valor);}},
    copyLoc:function(code){if(!code)return;try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(code);toast('Localizador copiado: '+code);}else{toast(code);}}catch(e){toast(code);}},
    diaForm:diaForm,
    diaSave:function(i){var rt=dRoteiro().slice();var tit=($('#dyTit').value||'').trim();var data=($('#dyData').value||'').trim();var g=parseFloat(($('#dyGasto').value||'').replace(',','.'));if(!tit&&!data){toast('Preencha ao menos o título.');return;}
      if(i>=0&&rt[i]){rt[i]=Object.assign({},rt[i],{titulo:tit,data:data,gasto:isNaN(g)?rt[i].gasto:g});}
      else{rt.push({dia:rt.length+1,titulo:tit,data:data,gasto:isNaN(g)?0:g,stops:[]});}
      VIA.set('roteiro',rt);closeSheet();render();toast('Dia salvo ✓');},
    diaDel:function(i){if(!window.confirm('Excluir este dia inteiro?'))return;var rt=dRoteiro().slice();rt.splice(i,1);rt.forEach(function(r,k){r.dia=k+1;});VIA.set('roteiro',rt);render();},
    stopForm:stopForm,
    stopSave:function(i,si){var rt=dRoteiro().slice();var r=rt[i];if(!r)return;r.stops=r.stops||[];
      var s={hora:($('#stHora').value||'').trim(),icone:($('#stIcone').value||'').trim(),titulo:($('#stTit').value||'').trim(),endereco:($('#stEnd').value||'').trim(),nota:($('#stNota').value||'').trim(),alerta:($('#stAlerta').value||'').trim()};
      if(!s.titulo){toast('Dê um título à parada.');return;}
      if(si>=0&&r.stops[si]){r.stops[si]=Object.assign({},r.stops[si],s);}
      else{s.id='st'+Date.now();r.stops.push(s);}
      VIA.set('roteiro',rt);closeSheet();render();toast('Parada salva ✓');},
    stopDel:function(i,si){var rt=dRoteiro().slice();var r=rt[i];if(r&&r.stops){r.stops.splice(si,1);VIA.set('roteiro',rt);render();}},
    secForm:secForm,
    secSave:function(){var nome=($('#secNome').value||'').trim();if(!nome){toast('Dê um nome à seção.');return;}var c=dCheck();c[clPanel].sections.push({id:'sec'+Date.now(),name:nome,open:true,items:[]});saveCheck(c);closeSheet();render();toast('Seção criada ✓');},
    secDel:function(p,sid){if(!window.confirm('Excluir esta seção e seus itens?'))return;var c=dCheck();c[p].sections=c[p].sections.filter(function(x){return x.id!==sid;});saveCheck(c);render();},
    toggleDia:function(i){var el=$('#dia-'+i);if(el)el.classList.toggle('open');},
    tabela:function(i){var el=$('#dia-'+i);if(el)el.classList.toggle('tblmode');},
    tblMove:function(key,dir){var cols=tblCols();var at=cols.indexOf(key);var to=at+dir;if(at<0||to<0||to>=cols.length)return;cols.splice(at,1);cols.splice(to,0,key);try{localStorage.setItem('via_tblcols',JSON.stringify(cols));}catch(e){}
      [].forEach.call(document.querySelectorAll('.dia-tabela'),function(w){var di=+w.getAttribute('data-diaidx');var r=dRoteiro()[di];if(r)w.innerHTML=tblHtml(r);});},
    foco:focoOpen,
    focoAgora:function(){var idx=diaDeHoje();if(idx<0)idx=0;focoOpen(idx);},
    focoNav:focoNav,focoClose:focoClose,
    clTab:function(p){clPanel=p;render();},
    clSec:function(p,sid){var c=dCheck();var s=c[p].sections.filter(function(x){return x.id===sid;})[0];if(s){s.open=!s.open;saveCheck(c);var el=$('#cls-'+sid);if(el)el.classList.toggle('open');}},
    clToggle:function(p,sid,iid){var c=dCheck();var s=c[p].sections.filter(function(x){return x.id===sid;})[0];var it=s&&s.items.filter(function(x){return x.id===iid;})[0];if(it){it.done=!it.done;saveCheck(c);render();}},
    clDel:function(p,sid,iid){var c=dCheck();var s=c[p].sections.filter(function(x){return x.id===sid;})[0];if(s){s.items=s.items.filter(function(x){return x.id!==iid;});saveCheck(c);render();}},
    clAdd:function(e,p,sid){if(e.key!=='Enter')return;var t=e.target.value.trim();if(!t)return;var c=dCheck();var s=c[p].sections.filter(function(x){return x.id===sid;})[0];if(s){s.items.push({id:'u'+Date.now(),text:t,done:false});s.open=true;saveCheck(c);render();}},
    gastoForm:gastoForm,metaForm:metaForm,
    chip:function(el){el.classList.toggle('on');},
    gastosTab:function(v){gastosView=v;render();},
    gastoSave:function(){var desc=$('#gDesc').value.trim(),cat=$('#gCat').value,val=parseFloat(($('#gVal').value||'').replace(',','.')),moeda=$('#gMoeda').value,data=$('#gData').value;if(!desc||!val){toast('Preencha descrição e valor.');return;}
      var pagou=[].map.call(document.querySelectorAll('#gPagou .pill.on'),function(b){return b.textContent;});
      var divide=[].map.call(document.querySelectorAll('#gDivide .pill.on'),function(b){return b.textContent;});
      if(!pagou.length){toast('Marque quem pagou.');return;}
      if(!divide.length){toast('Marque quem divide.');return;}
      var gs=dGastos();gs.push({id:Date.now(),desc:desc,cat:cat,moeda:moeda,valor:val,data:data,pagou:pagou,divide:divide});VIA.set('gastos',gs);closeSheet();render();toast('Gasto lançado ✓');},
    gastoDel:function(id){var gs=dGastos().filter(function(g){return g.id!==id;});VIA.set('gastos',gs);render();},
    metaSave:async function(){var t=parseFloat(($('#mTotal').value||'').replace(',','.'))||80000,c=parseFloat(($('#mCambio').value||'').replace(',','.'))||5;var stEl=$('#mStatus'),st=(stEl&&STATUS_META[stEl.value])?stEl.value:'Planejando';await VIA.set('meta',{total:t,cambio:c,status:st});closeSheet();espacos=await carregarEspacos();render();toast('Meta atualizada ✓');},
    docForm:docForm, docEdit:function(id){docForm(id);}, docMulti:docMulti,
    docGroup:function(t){docGroupsOpen[t]=!docGroupsOpen[t];render();},
    docSave:async function(id){var nome=$('#dNome').value.trim();if(!nome){toast('Dê um nome ao documento.');return;}
      var fi=$('#dFile'), file=fi&&fi.files&&fi.files[0], arquivo=null;
      if(file){if(file.size>DOC_MAX){toast('Arquivo grande demais (máx 20MB).');return;}
        var b=$('#dSaveBtn');if(b){b.disabled=true;b.textContent='enviando arquivo…';}
        arquivo=await docUpload(file);
        if(b){b.disabled=false;b.textContent='Salvar documento';}
        if(!arquivo)return;}
      var ds=dDocs(), campos={nome:nome,tipo:$('#dTipo').value,pessoa:$('#dPessoa').value.trim(),numero:$('#dNumero').value.trim(),validade:$('#dVal').value,link:$('#dLink').value.trim(),obs:$('#dObs').value.trim()};
      var ex=(typeof id!=='undefined'&&id!=='')?ds.filter(function(x){return x.id===id;})[0]:null;
      if(ex){for(var k in campos)ex[k]=campos[k];if(arquivo)ex.arquivo=arquivo;}
      else{campos.id=Date.now();campos.arquivo=arquivo;ds.push(campos);}
      VIA.set('documentos',ds);closeSheet();render();toast('Documento salvo ✓');},
    docOpen:async function(id){var d=dDocs().filter(function(x){return x.id===id;})[0];if(!d||!d.arquivo||!d.arquivo.path)return;toast('Abrindo anexo…');var u=await docSignedUrl(d.arquivo.path);if(u)window.open(u,'_blank','noopener');else toast('Não consegui abrir o anexo.');},
    docDel:async function(id){var d=dDocs().filter(function(x){return x.id===id;})[0];var ds=dDocs().filter(function(x){return x.id!==id;});VIA.set('documentos',ds);render();if(d&&d.arquivo&&d.arquivo.path&&sb){try{await sb.storage.from(DOC_BUCKET).remove([d.arquivo.path]);}catch(e){}}},
    joinForm:joinForm,
    monRefresh:async function(btn){
      if(btn){btn.disabled=true;btn.textContent='buscando voos…';}
      var ok=false;
      try{
        var rv=await fetch(MON_FN,{method:'POST'}).catch(function(){return null;});
        if(btn)btn.textContent='buscando hotel…';
        var rh=await fetch(HOTEL_FN,{method:'POST'}).catch(function(){return null;});
        ok=(rv&&rv.ok)||(rh&&rh.ok);
      }catch(e){}
      if(btn){btn.disabled=false;btn.textContent='🔄 Atualizar agora';}
      toast(ok?'Preços atualizados ✓':'Busca disparada — atualizando…');
      monitorRender('monWrap');
    },
    monChart:function(v){monChartView=v;monitorRender('monWrap');},
    monPill:function(el){var w=el.parentNode;[].forEach.call(w.querySelectorAll('.pill'),function(p){p.classList.remove('on');});el.classList.add('on');},
    monTeto:async function(btn){
      var el=document.getElementById('hotTeto');
      var v=el?parseFloat((el.value||'').replace(',','.')):NaN;
      if(!v||v<20){toast('Informe um teto em euros (ex.: 250).');return;}
      v=Math.round(Math.min(2000,v));
      var pe=document.querySelector('#estWrap .pill.on');
      var est=pe?parseInt(pe.getAttribute('data-est'),10):4;
      var pn=document.querySelector('#notaWrap .pill.on');
      var nota=pn?parseFloat(pn.getAttribute('data-nota')):4;
      if(btn){btn.disabled=true;btn.textContent='salvando…';}
      try{
        var s=await sb.rpc('set_hotel_filtros',{p_teto:v,p_estrelas:est,p_nota:nota});
        if(s&&s.error){toast('Falha ao salvar: '+s.error.message);if(btn){btn.disabled=false;btn.textContent='🔎 Testar';}return;}
        if(btn)btn.textContent='buscando hotel…';
        await fetch(HOTEL_FN,{method:'POST'}).catch(function(){return null;});
      }catch(e){}
      if(btn){btn.disabled=false;btn.textContent='🔎 Testar';}
      toast('Buscando '+(est<=3?'3★+':'4★')+' nota '+nota.toString().replace('.',',')+'+ até € '+v+'…');
      monitorRender('monWrap');
    },
    fab:function(){if(!espacoId){novaViagemForm();return;}var f=SEC_FAB[view];if(f)f();}
  };

  /* ---------- Configurações ---------- */
  function openCfg(){renderCfg();$('#cfgBg').classList.add('open');$('#cfgModal').style.display='block';syncScrollLock();}
  function closeCfg(){$('#cfgBg').classList.remove('open');$('#cfgModal').style.display='none';syncScrollLock();}
  function renderCfg(code){
    var body=$('#cfgBody');if(!body)return;
    var theme=document.documentElement.getAttribute('data-theme');
    var conta = user
      ? '<div class="conn">✓ Conectado — '+esc(user.email)+'</div><button class="mitem" id="cfgOut"><span class="mic">🚪</span> Sair da conta</button>'
      : '<div class="conn">Não conectado.</div>';
    var compart = (user&&espacoId)
      ? '<button class="mitem" id="cfgShare"><span class="mic">🔗</span> Compartilhar (gerar código)</button>'+(code?'<div class="code-box">'+esc(code)+'</div><div class="sub" style="text-align:center">Passe esse código pra Débora entrar. Vale 7 dias.</div>':'')
      : '';
    body.innerHTML='<h2 style="font-size:1.05rem;font-weight:600;margin-bottom:6px">⚙️ Configurações</h2>'+
      conta+compart+
      '<button class="mitem" id="cfgUpd"><span class="mic">🔄</span> Atualizar o app</button>'+
      '<button class="mitem" id="cfgTheme"><span class="mic">'+(theme==='dark'?'☀️':'🌙')+'</span> Tema '+(theme==='dark'?'claro':'escuro')+'</button>';
    var o=$('#cfgOut');if(o)o.addEventListener('click',sbLogout);
    var sh=$('#cfgShare');if(sh)sh.addEventListener('click',gerarConvite);
    $('#cfgUpd').addEventListener('click',updateApp);
    $('#cfgTheme').addEventListener('click',function(){setTheme(theme==='dark'?'light':'dark');});
  }

  /* ---------- init ---------- */
  initTheme();
  $('#cfgBtn').addEventListener('click',openCfg);
  $('#cfgBg').addEventListener('click',closeCfg);
  $('#shBg').addEventListener('click',closeSheet);
  sbInit();
  if(sb){sb.auth.getSession().then(function(s){user=(s&&s.data&&s.data.session)?s.data.session.user:null;boot();});}else{render();}

  setInterval(function(){var el=document.getElementById('cdTick');if(el)el.innerHTML=countdownHTML();},1000);

  if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').catch(function(){});});}
})();
